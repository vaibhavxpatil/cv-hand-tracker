<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR SandBox</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    #container {
      position: relative;
      width: 100%;
      max-width: 100vw;
    }

    video {
      /* Hidden — we draw it to canvas ourselves */
      display: none;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      max-height: 100svh;
      object-fit: contain;
    }

    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      font-family: system-ui, sans-serif;
      font-size: 1.2rem;
      text-align: center;
      z-index: 10;
      padding: 24px;
    }

    #loading.hidden { display: none; }

    #loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #333;
      border-top-color: #0af;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="container">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
  </div>

  <div id="loading">
    <div id="loading-spinner"></div>
    <div id="loading-msg">Requesting camera…</div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
